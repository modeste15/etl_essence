version: "3.8"

services:
  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]

      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data

  airflow-webserver:
    image: apache/airflow:2.8.2
    depends_on:
      - airflow-db
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_HOST}:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAG_DISCOVERY_SAFE_MODE: "false"
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 5
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 10
      AIRFLOW_UID: 50000
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags:cached
      - ./scripts:/opt/airflow/scripts
      - ./data:/data
    entrypoint: /bin/bash
    command: >
      -c "
      until pg_isready -h ${AIRFLOW_DB_HOST} -U ${AIRFLOW_DB_USER}; do
        echo 'Waiting for Postgres...';
        sleep 5;
      done;
      airflow db init &&
      airflow users create --username ${AIRFLOW_SERVER_USER} --firstname airflow --lastname airflow --role Admin --email airflow@example.com --password ${AIRFLOW_SERVER_PASSWORD} &&
      airflow webserver
      "

  airflow-scheduler:
    image: apache/airflow:2.8.2
    depends_on:
      - airflow-webserver
      - airflow-db
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_HOST}:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAG_DISCOVERY_SAFE_MODE: "false"
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 5
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 10
      AIRFLOW_UID: 50000
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY}

    volumes:
      - ./dags:/opt/airflow/dags:cached
      - ./scripts:/opt/airflow/scripts
      - ./data:/data
    entrypoint: /bin/bash
    command: >
      -c "
      until pg_isready -h ${AIRFLOW_DB_HOST} -U ${AIRFLOW_DB_USER}; do
        echo 'Waiting for Postgres...';
        sleep 5;
      done;
      airflow scheduler
      "

volumes:
  airflow_pgdata:
