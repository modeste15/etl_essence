name: Deploy 

on:
  push:
    branches:
      - primary

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: SSH

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 22
          script: |
            cd /root/etl_essence
            git pull 
            docker compose down
            docker compose up -d --build